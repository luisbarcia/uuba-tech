services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uuba
      POSTGRES_PASSWORD: uuba
      POSTGRES_DB: uuba
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uuba"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://uuba:uuba@db:5432/uuba
      API_KEY: uuba-dev-key-change-me
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
