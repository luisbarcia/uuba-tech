# Adicionar ao /opt/stack/nginx/default.conf dentro do server block
# Proxy para a Uúba Tech API

    # Uúba Tech API
    location /uuba-api/ {
        proxy_pass http://uuba-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uúba Tech API Docs (Scalar)
    location /uuba-docs {
        proxy_pass http://uuba-api:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Webhooks (sem proxy path rewrite — path completo)
    location /uuba-api/api/v1/webhooks/ {
        proxy_pass http://uuba-api:8000/api/v1/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
